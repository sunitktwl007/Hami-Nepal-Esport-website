<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hami Nepal | The Roster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-red: #ff003c;
            --dark-red: #1a050a;
            --card-bg: rgba(15, 15, 15, 0.9);
            --border-glow: rgba(255, 0, 60, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* --- HEADER --- */
        .roster-header {
            text-align: center; padding: 80px 10% 40px;
            background: radial-gradient(circle at top, var(--dark-red) 0%, #050505 100%);
        }
        .roster-header h1 { 
            font-family: 'Orbitron'; font-size: 3.5rem; letter-spacing: 10px; 
            text-transform: uppercase; text-shadow: 0 0 20px var(--neon-red);
        }
        .roster-header span { color: var(--neon-red); }
        .roster-header p { color: #888; font-size: 1.2rem; margin-top: 10px; letter-spacing: 2px; }

        /* --- STATS --- */
        .stats-summary {
            display: grid; grid-template-columns: repeat(4, 1fr);
            max-width: 1000px; margin: 0 auto 60px; text-align: center;
            border: 1px solid #222; padding: 30px; background: rgba(255,255,255,0.02);
        }
        .stat-item h2 { font-family: 'Orbitron'; color: var(--neon-red); font-size: 2.5rem; }
        .stat-item p { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }

        /* --- FILTERS --- */
        .roster-filters {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap;
        }
        .filter-tab {
            background: transparent; border: 1px solid #333; color: #fff;
            padding: 10px 25px; font-family: 'Orbitron'; font-size: 0.8rem;
            cursor: pointer; transition: 0.3s;
        }
        .filter-tab.active, .filter-tab:hover {
            background: var(--neon-red); border-color: var(--neon-red);
            box-shadow: 0 0 15px var(--neon-red);
        }

        /* --- GRID --- */
        .roster-grid {
            display: grid; padding: 0 8% 100px;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .player-card {
            background: var(--card-bg); border: 1px solid #222;
            padding: 20px; border-radius: 4px; position: relative;
            transition: 0.4s ease; overflow: hidden; text-align: center;
            cursor: pointer;
        }
        .player-card:hover {
            border-color: var(--neon-red); transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255, 0, 60, 0.2);
        }

        .mvp-badge {
            position: absolute; top: 10px; right: 10px;
            background: var(--neon-red); color: #fff; font-size: 0.6rem;
            padding: 3px 8px; font-family: 'Orbitron'; border-radius: 2px;
            animation: pulse 2s infinite; z-index: 2;
        }

        .player-img-wrap {
            width: 140px; height: 140px; margin: 0 auto 20px;
            border-radius: 50%; border: 2px solid #333; padding: 5px;
            transition: 0.4s; position: relative;
        }
        .player-card:hover .player-img-wrap { border-color: var(--neon-red); }
        .player-img-wrap img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #111; }

        .player-info h3 { font-family: 'Orbitron'; font-size: 1.1rem; letter-spacing: 1px; }
        .player-role { color: var(--neon-red); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; }

        .mini-stats {
            display: flex; justify-content: space-around;
            border-top: 1px solid #222; padding-top: 15px; margin-top: 15px;
        }
        .stat-small p { font-size: 0.9rem; font-weight: bold; }
        .stat-small span { font-size: 0.6rem; color: #555; text-transform: uppercase; display: block; }

        .player-socials { margin-top: 15px; display: flex; justify-content: center; gap: 15px; }
        .player-socials a { color: #444; transition: 0.3s; font-size: 1rem; }
        .player-socials a:hover { color: var(--neon-red); }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; z-index: 9999;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-card {
            background: #0a0a0a; border: 1px solid var(--neon-red);
            width: 90%; max-width: 600px; padding: 40px; border-radius: 5px;
            position: relative; display: flex; gap: 30px;
        }
        #modalImg { width: 200px; height: 200px; object-fit: cover; border: 2px solid var(--neon-red); }

        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        @media (max-width: 768px) {
            .stats-summary { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .modal-card { flex-direction: column; text-align: center; align-items: center; }
        }
    </style>
</head>

        // RENDER FUNCTION
        function renderRoster() {
            const grid = document.getElementById('rosterGrid');
            grid.innerHTML = members.map(m => `
                <div class="player-card ${m.type}" onclick="openBio('${m.name}', '${m.role}', '${m.quote}', '${m.img}')">
                    ${m.mvp ? '<div class="mvp-badge">MVP</div>' : ''}
                    <div class="player-img-wrap">
                        <img src="${m.img}" alt="${m.name}" onerror="this.src='https://via.placeholder.com/140/111/ff003c?text=${m.name}'">
                    </div>
                    <div class="player-info">
                        <h3>${m.name.toUpperCase()}</h3>
                        <p class="player-role">${m.role}</p>
                    </div>
                    <div class="mini-stats">
                        <div class="stat-small"><span>${m.s1}</span><p>${m.v1}</p></div>
                        <div class="stat-small"><span>${m.s2}</span><p>${m.v2}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function filterType(type, event) {
            const cards = document.querySelectorAll('.player-card');
            const tabs = document.querySelectorAll('.filter-tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            cards.forEach(card => {
                card.style.display = (type === 'all' || card.classList.contains(type)) ? 'block' : 'none';
            });
        }

        function openBio(name, role, quote, img) {
            document.getElementById('modalName').innerText = name.toUpperCase();
            document.getElementById('modalRole').innerText = role;
            document.getElementById('modalQuote').innerText = `"${quote}"`;
            document.getElementById('modalImg').src = img;
            // Handle placeholder if image doesn't exist
            document.getElementById('modalImg').onerror = function() {
                this.src = 'https://via.placeholder.com/200/111/ff003c?text=' + name;
            };
            document.getElementById('bioModal').style.display = 'flex';
        }

        function closeBio() {
            document.getElementById('bioModal').style.display = 'none';
        }

        // Initialize
        renderRoster();

        // Counters
        document.querySelectorAll('.counter').forEach(c => {
            const target = +c.innerText;
            let count = 0;
            const update = () => {
                const inc = target / 50;
                if (count < target) {
                    count = Math.ceil(count + inc);
                    c.innerText = count;
                    setTimeout(update, 30);
                } else c.innerText = target;
            };
            update();
        });
    </script>
