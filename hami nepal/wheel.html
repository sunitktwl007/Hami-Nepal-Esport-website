<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin The Wheel - Hami Nepal</title>
    <style>
        /* 1. CSS VARIABLES & THEME */
        :root {
            --bg-dark: #070b14;
            --card-bg: #111827;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff00ff;
            
            /* Rarity Colors */
            --common: #4ade80;    /* Green */
            --rare: #3b82f6;      /* Blue */
            --epic: #a855f7;      /* Purple */
            --legendary: #eab308; /* Yellow */
            --mythic: #ef4444;    /* Red */
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* 2. HEADER & BALANCE */
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin: 0;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #94a3b8;
            margin-top: 5px;
        }

        .balance-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            background: var(--card-bg);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-item {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 3. THE WHEEL CORE */
        .wheel-container {
            position: relative;
            width: 380px;
            height: 380px;
            margin-bottom: 40px;
        }

        /* The Triangle Pointer */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid var(--neon-cyan);
            z-index: 10;
            filter: drop-shadow(0 0 5px var(--neon-cyan));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #1e293b;
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.15);
            /* Creating 8 slices using conic-gradient */
            background: conic-gradient(
                var(--common) 0deg 45deg,
                var(--rare) 45deg 90deg,
                var(--common) 90deg 135deg,
                var(--epic) 135deg 180deg,
                var(--common) 180deg 225deg,
                var(--legendary) 225deg 270deg,
                var(--rare) 270deg 315deg,
                var(--mythic) 315deg 360deg
            );
        }

        /* Center Hub */
        .wheel::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: var(--bg-dark);
            border: 4px solid white;
            border-radius: 50%;
            z-index: 2;
        }

        /* 4. SPIN BUTTON */
        .spin-button {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 15px 45px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--neon-cyan);
            position: relative;
            overflow: hidden;
        }

        .spin-button:hover:not(:disabled) {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 40px var(--neon-cyan);
            transform: scale(1.05);
        }

        .spin-button:disabled {
            border-color: #334155;
            color: #334155;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 5. TICKER */
        .ticker-wrap {
            margin-top: 40px;
            width: 100%;
            background: rgba(0,0,0,0.3);
            padding: 10px 0;
            border-top: 1px solid #1e293b;
            overflow: hidden;
        }

        .ticker-move {
            display: inline-block;
            white-space: nowrap;
            animation: ticker 20s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker-item {
            display: inline-block;
            padding: 0 2rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>Spin & Win</h1>
        <p class="subtitle">Use your Hami Nepal Coins to win exclusive prizes</p>
        
        <div class="balance-container">
            <div class="stat-item">🪙 <span id="coins">12,450</span></div>
            <div class="stat-item">💎 <span id="diamonds">32</span></div>
        </div>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <button class="spin-button" id="spinBtn">🎮 Spin Now</button>

    <div class="ticker-wrap">
        <div class="ticker-move">
            <span class="ticker-item">🔥 ShadowBlade won 25 Diamonds</span>
            <span class="ticker-item">🔥 Naomi won 5,000 Coins</span>
            <span class="ticker-item">🔥 User992 won 10 Diamonds</span>
            <span class="ticker-item">🔥 KingNepal won 50 Diamonds (MYTHIC!)</span>
        </div>
    </div>

    <script>
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const coinText = document.getElementById('coins');
        const diamondText = document.getElementById('diamonds');

        let currentRotation = 0;
        let userCoins = 12450;
        let userDiamonds = 32;

        // Reward Data (Mapping angles to prizes)
        // Slices are 45 degrees each (360 / 8)
        const rewards = [
            { name: "500 Coins", type: "coin", val: 500, angle: 22.5 },   // Slice 1
            { name: "5 Diamonds", type: "dia", val: 5, angle: 67.5 },    // Slice 2
            { name: "1,000 Coins", type: "coin", val: 1000, angle: 112.5 },
            { name: "10 Diamonds", type: "dia", val: 10, angle: 157.5 },
            { name: "2,500 Coins", type: "coin", val: 2500, angle: 202.5 },
            { name: "25 Diamonds", type: "dia", val: 25, angle: 247.5 },
            { name: "Free Spin", type: "free", val: 0, angle: 292.5 },
            { name: "50 Diamonds", type: "dia", val: 50, angle: 337.5 }   // Mythic
        ];

        spinBtn.addEventListener('click', () => {
            if (userCoins < 1000) {
                alert("You need at least 1,000 coins to spin!");
                return;
            }

            // Deduct cost
            userCoins -= 1000;
            coinText.innerText = userCoins.toLocaleString();
            spinBtn.disabled = true;

            // Determine result based on probability
            const rand = Math.random() * 100;
            let win;

            if (rand < 1) win = rewards[7];      // Mythic (1%)
            else if (rand < 5) win = rewards[5]; // Legendary (4%)
            else if (rand < 15) win = rewards[3]; // Epic (10%)
            else if (rand < 40) win = rewards[1]; // Rare (25%)
            else win = rewards[0];               // Common (default)

            // Calculate Spin
            // 360 * 5 (rotations) + (360 - win.angle) to line up with pointer
            const extraDegrees = (5 * 360) + (360 - win.angle);
            currentRotation += extraDegrees;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // Handle Prize after animation finishes (5 seconds)
            setTimeout(() => {
                spinBtn.disabled = false;
                
                if (win.type === "coin") {
                    userCoins += win.val;
                    coinText.innerText = userCoins.toLocaleString();
                } else if (win.type === "dia") {
                    userDiamonds += win.val;
                    diamondText.innerText = userDiamonds.toLocaleString();
                }

                alert(`🎉 Congratulations! You won ${win.name}`);
            }, 5000);
        });
    </script>
</body>
</html>
